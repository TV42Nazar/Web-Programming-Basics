<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облік ДГУ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Реєстрація ДГУ</h1>
        
        <form id="dguForm">
            <div class="form-group">
                <label for="objectName">Об'єкт (Локація):</label>
                <input type="text" id="objectName" name="objectName" required>
            </div>
            
            <div class="form-group">
                <label for="type">Тип ДГУ:</label>
                <select id="type" name="type" required>
                    <option value="">Оберіть тип</option>
                    <option value="Відкритий">Відкритий</option>
                    <option value="В кожусі">В кожусі</option>
                    <option value="Контейнерний">Контейнерний</option>
                </select>
            </div>

            <div class="form-group">
                <label for="power">Потужність (кВт):</label>
                <input type="number" id="power" name="power" min="0.1" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="fuel">Паливо:</label>
                <input type="text" id="fuel" name="fuel" placeholder="Напр. Дизель Євро-5" required>
            </div>

            <div class="form-group">
                <label for="consumption">Витрата (л/год):</label>
                <input type="number" id="consumption" name="consumption" min="0.1" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="maintenance">Дата наступного ТО:</label>
                <input type="date" id="maintenance" name="maintenance" required>
            </div>

            <div class="form-actions">
                <button type="submit">Зберегти</button>
                <button type="reset">Очистити</button>
            </div>
        </form>

        <h2>Список зареєстрованих ДГУ</h2>
        <table id="dguTable">
            <thead>
                <tr>
                    <th>Об'єкт</th>
                    <th>Тип</th>
                    <th>Потужність</th>
                    <th>Паливо</th>
                    <th>Витрата</th>
                    <th>Дата ТО</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
