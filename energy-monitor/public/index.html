<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг об'єкта генерації / насосної станції</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .note { font-size: 12px; color: #666; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Форма реєстрації параметрів об'єкта</h2>
    <form action="/submit-data" method="POST">
        
        <div class="form-group">
            <label for="operatorName">Ім’я оператора:</label>
            <input type="text" id="operatorName" name="operatorName" required>
        </div>
        <div class="form-group">
            <label for="objectType">Тип об’єкта:</label>
            <select id="objectType" name="objectType">
                <input type="text" id="objectType" name="objectType" placeholder="Напр. Насосна станція №1" required>
            </select>
        </div>
        <div class="form-group">
            <label for="address">Адреса:</label>
            <input type="text" id="address" name="address" required>
        </div>

        <hr>
        
        <div class="form-group">
            <label for="pressure">Тиск на виході (атм):</label>
            <span class="note">Діапазон: 3-6 (Норма: 4-5.5)</span>
            <input type="number" id="pressure" name="pressure" min="3" max="6" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="performance">Продуктивність (м³/год):</label>
            <span class="note">Діапазон: 50-200 (Норма: 80-150)</span>
            <input type="number" id="performance" name="performance" min="50" max="200" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="power">Споживана потужність (кВт):</label>
            <span class="note">Діапазон: 0-100 (Норма: 30-80)</span>
            <input type="number" id="power" name="power" min="0" max="100" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="waterLevel">Рівень води в резервуарі (м):</label>
            <span class="note">Діапазон: 0-10 (Норма: 3-8)</span>
            <input type="number" id="waterLevel" name="waterLevel" min="0" max="10" step="0.1" required>
        </div>

        <hr>
        
        <div class="form-group">
            <label for="pumpCount">Кількість працюючих насосів:</label>
            <input type="number" id="pumpCount" name="pumpCount" min="0" required>
        </div>
        <div class="form-group">
            <label for="rotationFreq">Частота обертання (об/хв):</label>
            <input type="number" id="rotationFreq" name="rotationFreq" min="0" required>
        </div>
        <div class="form-group">
            <label for="engineTemp">Температура двигуна (°C):</label>
            <input type="number" id="engineTemp" name="engineTemp" required>
        </div>

        <button type="submit">Відправити дані</button>
    </form>
</div>

</body>
</html>
